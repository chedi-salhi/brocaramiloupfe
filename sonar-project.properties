sonar.projectKey=chedi-salhi_brocaramiloupfe
sonar.organization=chedi-salhi

# Monorepo : backend (NestJS) + frontend (Next.js), tests colocalisés avec le
# code source plutôt que dans un dossier séparé.
sonar.sources=backend/src,frontend/src
sonar.tests=backend/src,frontend/src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.test.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/*.test.tsx

# Rapports de couverture générés par Jest (backend) et Vitest (frontend) —
# récupérés depuis les artefacts des jobs "backend"/"frontend" existants
# plutôt que ré-exécutés ici (voir le job sonarqube dans ci.yml).
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info
